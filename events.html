<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - LinkHub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- TOP BAR -->
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-logo">LH</div>
        <div class="topbar-search">
          <span style="font-size: 0.85rem; color: #65676b;">🔍</span>
          <input placeholder="Search LinkHub events" />
        </div>
      </div>
      <nav class="topbar-center">
        <a href="../index.html" class="topbar-link">Home</a>
        <a href="groups.html" class="topbar-link">Groups</a>
        <a href="events.html" class="topbar-link active">Events</a>
      </nav>
      <div class="topbar-right">
        <div class="avatar-small">JM</div>
        <span>Joe Maina</span>
        <a href="login.html" class="chip" style="text-decoration: none;">Sign In</a>
        <a href="admin.html" class="chip" style="text-decoration: none;">Admin</a>
        <button id="logout-button" class="chip logout-btn" style="display: none; border: none; background: #e4e6eb;">Sign Out</button>
        <div id="dark-mode-toggle" class="chip" style="cursor: pointer;">🌙</div>
        <div class="chip">⋯</div>
      </div>
    </header>

    <main class="layout" style="padding-top: 2rem;">
      <!-- MAIN CONTENT -->
      <section style="grid-column: 1 / -1;">
        <div style="margin-bottom: 2rem;">
          <h1 style="margin: 0 0 1rem;">Community Events</h1>
          <p style="color: var(--muted); margin: 0;">Discover and join exciting events happening in our community.</p>
        </div>

        <!-- Create Event -->
        <div class="card" style="background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; margin-bottom: 2rem;">
          <h3 style="margin: 0 0 0.5rem;">Create an Event</h3>
          <p style="margin: 0 0 1rem;">Organize gatherings, workshops, or meetups for the community.</p>
          <form id="create-event-form" style="display: grid; gap: 0.75rem;">
            <input name="name" placeholder="Event name" required style="padding: 0.75rem; border-radius: 0.5rem; border: none;" />
            <input name="date" type="date" required style="padding: 0.75rem; border-radius: 0.5rem; border: none;" />
            <input name="time" type="time" placeholder="Time" required style="padding: 0.75rem; border-radius: 0.5rem; border: none;" />
            <input name="location" placeholder="Location" required style="padding: 0.75rem; border-radius: 0.5rem; border: none;" />
            <input name="attending" type="number" placeholder="Attending count" min="0" style="padding: 0.75rem; border-radius: 0.5rem; border: none;" />
            <textarea name="description" placeholder="Event description" required style="padding: 0.75rem; border-radius: 0.5rem; border: none; resize: vertical;"></textarea>
            <button type="submit" style="background: white; color: var(--primary); border: none; padding: 0.75rem 1rem; border-radius: 0.5rem; cursor: pointer; font-weight: 600;">
              + Create Event
            </button>
          </form>
        </div>

        <!-- Events List -->
        <div style="display: flex; flex-direction: column; gap: 1rem;" data-events-container>
          <!-- Events will be loaded here -->
        </div>
      </section>
    </main>

    <script src="../js/app.js"></script>
</body>
</html>
